spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/remembear
    username: remembear
    password: remembear
    driver-class-name: org.postgresql.Driver
  hikari:
    maximum-pool-size: 10
    minimum-idle: 5
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000
  flyway:
    schemas: remembear
    default-schema: remembear
    table: flyway_schema_history
    locations: filesystem:flyway/migration
    enabled: true

logging:
  level:
    org.springframework.jdbc: DEBUG
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG